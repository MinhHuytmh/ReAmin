<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>XanhsachFarm</title>
</head>
<style>
		* {
    margin: 0;
    padding: 0;
    box-sizing: border-box; 
}
body {
    width: 100%;
    height: 100vh; 
}
header{
	background-color: #006400;
	height: 150px;
	display: flex;
	align-items: center;
	align-items: center;
		}
.advise{ 
	font-family: sans-serif;
	font-weight: bold;
	position: absolute;
	top: 20px;
	right: 20px;


	background-color: #ffffffff;
	padding: 10px 20px;
	border-radius: 20px;
	box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
    cursor: pointer;
    color: #3CB371;
}
.logo{
	display: flex;
	align-items: center;
	gap: 10px;
	text-align: center;
	padding-left: 25px;
	padding-top: 25px;
}

.logo img{
	height: 100px;
	width: auto
}
.logo img:hover{
	cursor: pointer;
}
.logo-text{
	display: flex;
	flex-direction: column;
	color: white;
	font-family: sans-serif;
	line-height: 1.3;

}

.small-text{
	font-size: 16px;
	font-weight: normal;
}
.small-text:hover{
	cursor: pointer;
	color: darkblue;
}
.big-text{
	font-size: 24px;
	font-weight: bold;
	text-align: right;

}
.big-text:hover{
	cursor: pointer;
	color: darkblue;
}
.search{
	display: flex;
	flex: 1;
	max-width:700px;
	position: relative;
	margin: 0 50px;
	margin-top: 20px;


}
.search-input{
	width: 100%;
	border-radius: 20px;
	border: none;
	font-size: 14px;
	height: 50px;
	padding: 10px 15px 10px 40px
}
.search-logo{
	position: absolute;
    left: 5px;
    top: 50%;
    transform: translateY(-50%); 
    background: none;
    border: none;
    cursor: pointer;
    font-size: 22px;
    color: #3CB371;
    display: flex;
    align-items: center;
    justify-content: center;

}
.cart-count {
    position: relative;
    top: 0;
    right: 0;
    color: white;
    padding: 3px 7px;
    border-radius: 50%;
    font-weight: bold;
    font-size: 25px;
    width: 40px;
    height: 40px;
    justify-content: center;
    align-items: center;
    margin-top: 30px;
    color: #ffffff;  /* Đổi sang màu trắng cho nổi bật */
    transition: all 0.3s ease;
    
}
.login{
	padding-left: 40px;
	padding-top: 25px;
	background-color:#006400 ;
	color: white;
	font-family: sans-serif;
	font-weight: bold;
	font-size: 18px;
}
.login:hover{
	cursor: pointer;
	color: darkblue;

}
.exit {
    color: #ffffff;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    position: relative;
    background-color: #00FF00;
    border-radius: 20px;
    height: 40px;
    width: 120px;
    justify-content: center;
    text-align: center;
    padding-top: 10px;
    margin-top: 20px;
    margin-left: 15px;
}
.exit:hover{
	cursor: pointer;
	color: darkblue;
}


.feature-bar {
    display: flex;
    justify-content: center;
    list-style: none;
    background-color: #ffffffff;
    padding: 15px 0;
    justify-content:space-around;
    margin-top: 10px;
}

.feature-bar li {
    font-family: sans-serif;
    font-weight: bold;
    font-size: 16px;
    color: #333;
    cursor: pointer;
    transition: 0.3s;
}

.feature-bar li:hover {
    color: #3CB371;
}

.feature-bar a {
    text-decoration: none;
    color: inherit;
}
.banner {
    width: 100%;
    height: 500px; 
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.banner img {
    width: 100%;
    height: 100%;
    object-fit: cover; 
    display: block;
}



</style>
</head>
<header>
    <div class="logo">
    	<img src="file:///Users/macos/Downloads/hahah.png" alt="Logo">
    	<div class="logo-text">
    		<span class="small-text">XANH SẠCH</span>
    		<span class="big-text">FARM</span>
    	</div>
    </div>
    <form class="search">
    	<button type="submit" class="search-logo">
        🔍
    </button>
    	<input type="text" class="search-input" placeholder="Bạn muốn tìm gì..." >
    	
    </form>
    <div class="advise">
        Tư vấn ngay: 1800 6928</div>
    <div class="cart-count">🛒 <span class="count"></span></div>
    <div class="login">👤  Đăng Nhập</div>
    <div class="border-exit"><div class="exit">Đăng Xuất</div></div> 
   
   </header>
    <ul class="feature-bar">
    	<li><a href="#"></a> Khảo sát thông tin</li>
    	<li><a href="#"></a> Chỉ số sinh học</li>
    	<li><a href="#"></a> Gợi ý</li>
    	<li><a href="#"></a> Tham khảo</li>
    	<li><a href="#"></a> Lịch sử</li>
</ul>
<div class="banner">
	<img src="https://shopnongsansach.com/wp-content/uploads/thuc-pham-sach-nong-san-sach.jpg" alt="banner">
</div>
<body>
</body>
</html>
